<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Forge • AI Image Studio</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .thumb:hover { transform: scale(1.05); box-shadow: 0 0 0 3px rgb(59 130 246); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
<div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Neural Forge</h1>
            <p class="text-zinc-400 text-sm">Powered by Puter AI • Professional Image Studio</p>
        </div>
        <div id="authStatus" class="text-xs px-4 py-2 bg-zinc-900 rounded-full border border-zinc-700">Not signed in</div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Controls -->
        <div class="lg:col-span-5 bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
            <form id="form" class="space-y-8">
                <div>
                    <label for="prompt" class="block text-sm font-medium text-zinc-400 mb-2">Base Prompt</label>
                    <textarea id="prompt" rows="4" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 text-base focus:outline-none focus:border-blue-500 resize-none" placeholder="A futuristic cityscape at dusk, towering skyscrapers..."></textarea>
                </div>

                <div>
                    <label for="negative" class="block text-sm font-medium text-zinc-400 mb-2">Negative Prompt (optional)</label>
                    <textarea id="negative" rows="2" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 text-base focus:outline-none focus:border-blue-500 resize-none" placeholder="blurry, low quality, artifacts, deformed..."></textarea>
                </div>

                <!-- New: Prompt Variations -->
                <div class="space-y-4 border-t border-zinc-800 pt-6">
                    <div class="flex items-center justify-between">
                        <label class="text-sm font-medium text-zinc-300">Enable Prompt Variations</label>
                        <input type="checkbox" id="enableVariations" class="w-5 h-5 accent-blue-500">
                    </div>

                    <div id="variationsSection" class="space-y-4 hidden">
                        <div>
                            <label for="variationStrategy" class="block text-sm font-medium text-zinc-400 mb-2">Variation Type</label>
                            <select id="variationStrategy" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 text-base focus:outline-none focus:border-blue-500">
                                <option value="numbered">Numbered Versions (e.g. version 1, version 2)</option>
                                <option value="styles">Artistic Styles Cycle</option>
                                <option value="boosters">Quality Boosters</option>
                                <option value="custom">Custom List (comma-separated)</option>
                            </select>
                        </div>

                        <div id="customVariationsDiv" class="hidden">
                            <label for="customVariations" class="block text-sm font-medium text-zinc-400 mb-2">Custom Endings (comma-separated)</label>
                            <textarea id="customVariations" rows="2" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 text-base focus:outline-none focus:border-blue-500 resize-none" placeholder="at sunset, in rain, neon lights, golden hour, dramatic fog"></textarea>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label for="model" class="block text-sm font-medium text-zinc-400 mb-2">Model</label>
                        <select id="model" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 text-base focus:outline-none focus:border-blue-500"></select>
                    </div>
                    <div>
                        <label for="quality" class="block text-sm font-medium text-zinc-400 mb-2">Quality</label>
                        <select id="quality" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 text-base focus:outline-none focus:border-blue-500">
                            <option value="">Default</option>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="hd">HD</option>
                            <option value="standard">Standard</option>
                        </select>
                    </div>
                </div>

                <!-- Dimensions, numImages, testMode remain the same as previous version -->
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-3">Dimensions</label>
                    <div class="flex gap-2 mb-4">
                        <button type="button" onclick="setPreset(1024,1024)" class="flex-1 py-2.5 text-sm font-medium border border-zinc-700 rounded-2xl hover:bg-zinc-800 transition-colors">Square</button>
                        <button type="button" onclick="setPreset(896,1344)" class="flex-1 py-2.5 text-sm font-medium border border-zinc-700 rounded-2xl hover:bg-zinc-800 transition-colors">Portrait</button>
                        <button type="button" onclick="setPreset(1344,896)" class="flex-1 py-2.5 text-sm font-medium border border-zinc-700 rounded-2xl hover:bg-zinc-800 transition-colors">Landscape</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-zinc-500">Width</label>
                            <input id="width" type="number" min="256" max="2048" step="64" value="1024" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-3 text-base">
                        </div>
                        <div>
                            <label class="text-xs text-zinc-500">Height</label>
                            <input id="height" type="number" min="256" max="2048" step="64" value="1024" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-3 text-base">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label for="numImages" class="block text-sm font-medium text-zinc-400 mb-2">Number of Images</label>
                        <select id="numImages" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 text-base focus:outline-none focus:border-blue-500">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3" selected>3</option>
                            <option value="4">4</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-3 self-end pb-4">
                        <input type="checkbox" id="testMode" class="w-5 h-5 accent-blue-500">
                        <label for="testMode" class="text-sm text-zinc-400">Test Mode (free preview)</label>
                    </div>
                </div>

                <button id="generateBtn" type="button"
                        class="w-full bg-blue-600 hover:bg-blue-500 transition-colors text-white font-semibold py-5 rounded-2xl text-lg flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="btnText">Generate Images</span>
                </button>
            </form>
        </div>

        <!-- Preview Area (same as before, with added prompt display per image) -->
        <div class="lg:col-span-7 bg-zinc-900 border border-zinc-800 rounded-3xl p-8 flex flex-col">
            <div id="status" role="alert" aria-live="polite" class="text-sm h-6 mb-4 text-zinc-400"></div>

            <div id="viewfinder" class="flex-1 bg-black border border-zinc-800 rounded-3xl p-6 overflow-auto relative">
                <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
                <div id="placeholder" class="h-full flex items-center justify-center text-zinc-500 text-sm">Your images will appear here</div>
                <div id="loadingOverlay" class="hidden absolute inset-0 bg-black/70 flex items-center justify-center z-10">
                    <div class="text-center">
                        <div class="spinner w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div>
                        <p class="mt-6 text-lg font-medium">Generating images…</p>
                        <p id="progressText" class="mt-2 text-sm text-zinc-400">Please wait 10–60 seconds depending on model & count</p>
                    </div>
                </div>
            </div>

            <div id="history" class="mt-8">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-xs uppercase tracking-widest text-zinc-500">Recent Generations</p>
                    <button onclick="clearHistory()" class="text-xs text-zinc-400 hover:text-white">Clear</button>
                </div>
                <div id="historyThumbs" class="flex gap-4 overflow-x-auto pb-4 snap-x snap-mandatory"></div>
            </div>
        </div>
    </div>
</div>

<script>
// ... (models array, populateModels, setPreset functions remain the same)

const variationModifiers = {
    styles: [
        ", cyberpunk neon aesthetic",
        ", photorealistic, ultra detailed",
        ", oil painting masterpiece",
        ", studio ghibli anime style",
        ", cinematic concept art",
        ", watercolor illustration",
        ", voxel art low-poly",
        ", surreal dreamlike"
    ],
    boosters: [
        ", highly detailed, 8k resolution",
        ", sharp focus, dramatic lighting",
        ", intricate details, masterpiece",
        ", vibrant colors, award-winning",
        ", cinematic composition, depth of field"
    ]
};

document.getElementById('enableVariations').addEventListener('change', (e) => {
    document.getElementById('variationsSection').classList.toggle('hidden', !e.target.checked);
});

document.getElementById('variationStrategy').addEventListener('change', (e) => {
    document.getElementById('customVariationsDiv').classList.toggle('hidden', e.target.value !== 'custom');
});

async function generateBatch() {
    // ... (existing validation, button disable, overlay show)

    const basePrompt = document.getElementById('prompt').value.trim();
    if (!basePrompt) { /* error */ return; }

    const enableVar = document.getElementById('enableVariations').checked;
    const num = parseInt(document.getElementById('numImages').value);
    const strategy = document.getElementById('variationStrategy').value;
    let customList = [];

    if (enableVar && strategy === 'custom') {
        customList = document.getElementById('customVariations').value.split(',').map(s => s.trim()).filter(Boolean);
    }

    const prompts = [];
    for (let i = 0; i < num; i++) {
        let variedPrompt = basePrompt;

        if (enableVar && num > 1) {
            let suffix = '';

            if (strategy === 'numbered') {
                suffix = `, version ${i + 1}`;
            } else if (strategy === 'styles' || strategy === 'boosters') {
                const list = variationModifiers[strategy];
                suffix = list[i % list.length];
            } else if (strategy === 'custom' && customList.length > 0) {
                suffix = `, ${customList[i % customList.length]}`;
            }

            variedPrompt += suffix;
        }

        prompts.push(variedPrompt);
    }

    // Now generate using the array of prompts
    const promises = prompts.map(async (promptText, index) => {
        const slot = createResultSlot(index + 1);
        document.getElementById('resultsGrid').appendChild(slot);

        try {
            const img = await generateSingleImage(promptText);  // ← pass varied prompt
            slot.innerHTML = '';
            slot.appendChild(img);
            addDownloadButton(slot, img.src);

            // Show used prompt
            const promptLabel = document.createElement('p');
            promptLabel.className = "text-xs text-zinc-500 mt-2 px-3 pb-2 truncate";
            promptLabel.textContent = `Prompt: ${promptText.substring(0, 80)}${promptText.length > 80 ? '...' : ''}`;
            slot.appendChild(promptLabel);

            addToHistory(img.src, promptText, num > 1 ? index + 1 : null);
            return img;
        } catch (err) {
            slot.innerHTML = `<p class="text-red-400 text-sm p-4">Failed: ${err.message || 'Error'}</p>`;
            return null;
        }
    });

    // ... (await Promise.all, status updates, finally block same as before)
}

async function generateSingleImage(specificPrompt) {
    // Same as before, but use specificPrompt instead of reading from DOM
    const negative = document.getElementById('negative').value.trim();
    const model = document.getElementById('model').value;
    const quality = document.getElementById('quality').value;
    const width = parseInt(document.getElementById('width').value);
    const height = parseInt(document.getElementById('height').value);
    const testMode = document.getElementById('testMode').checked;

    const options = { model, test_mode: testMode };
    if (quality) options.quality = quality;
    if (negative) options.negative_prompt = negative;

    if (!isNaN(width) && !isNaN(height)) {
        if (model.includes('gpt') || model.includes('dall') || model.includes('gemini') || model.includes('grok')) {
            options.ratio = { w: width, h: height };
        } else {
            options.width = width;
            options.height = height;
        }
    }

    return await puter.ai.txt2img(specificPrompt, options);
}

// ... (rest of the script: createResultSlot, addDownloadButton, addToHistory, clearHistory, event listener for generateBtn same as previous version)
</script>
</body>
</html>
